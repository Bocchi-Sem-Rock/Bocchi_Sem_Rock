<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #4a5eff, #7d8fff);
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            width: min(420px, calc(100% - 32px));
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.18);
            padding: 32px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .logo {
            text-align: center;
            font-size: 1.8rem;
            letter-spacing: 0.08em;
            font-weight: 700;
            margin-bottom: 24px;
            color: white;
        }

        form div {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            color: #fff;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease, transform 0.2s ease;
            box-sizing: border-box;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        input:focus {
            border-color: #a3b4ff;
            transform: translateY(-1px);
            box-shadow: 0 0 0 4px rgba(163, 180, 255, 0.14);
        }

        button {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #8ea5ff 0%, #4a5eff 100%);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 25px rgba(74, 94, 255, 0.35);
        }

        button:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="logo">Cadastro</div>

        <form>
            <div>
                <label for="matricula">Matrícula</label>
                <input type="text" id="matricula" name="matricula" placeholder="Digite a matrícula">
            </div>

            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Digite o nome">
            </div>

            <div>
                <label for="nota1">Nota 1</label>
                <input type="number" id="nota1" name="nota1" step="0.1" placeholder="0.0">
            </div>

            <div>
                <label for="nota2">Nota 2</label>
                <input type="number" id="nota2" name="nota2" step="0.1" placeholder="0.0">
            </div>

            <button type="submit">Cadastrar</button>
        </form>
    </div>

</body>
</html>
